<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SocialCard 2026 - Preview</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🤳 SocialCard 2026</h1>
        <p>Crie o preview do seu perfil instantaneamente.</p>
    </header>

    <main>
        <section id="form-container">
            <form id="social-form">
                <input type="text" id="nome" placeholder="Nome Exibição" required>
                <input type="text" id="usuario" placeholder="@usuario" required>
                <textarea id="bio" placeholder="Sua biografia..." required></textarea>
                
                <select id="tema">
                    <option value="tema-light">Estilo Light (Padrão)</option>
                    <option value="tema-dark">Estilo Dark (Escuro)</option>
                    <option value="tema-neon">Estilo Neon (Brilhante)</option>
                </select>

                <button type="submit">Publicar Perfil</button>
            </form>
        </section>

        <section id="timeline">
            </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
